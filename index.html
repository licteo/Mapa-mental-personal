<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
  <title>IPTV VR Pro</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#051019">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    :root{--bg:#051019;--accent:#00d4ff;--danger:#ff4444;--success:#39ff14;--warning:#ffbb00}
    *{box-sizing:border-box;font-family:sans-serif}
    
    html, body { margin:0; padding:0; background:var(--bg); color:#e6eef6; height: 100%; overflow: hidden; }
    
    .container { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; max-width:980px; margin:0 auto; padding:15px; display: flex; flex-direction: column; position: relative; z-index: 1; }
    body.is-vr .container { display: none; }
    
    .input-section{display:flex; gap:8px; margin:8px 0; flex-wrap:wrap}
    input{padding:12px; border-radius:8px; border:1px solid #22303a; background:#0b1115; color:#fff; font-size:16px}
    #nameIn { flex: 1; min-width: 90px; }
    #urlIn { flex: 2; min-width: 140px; }
    
    button{border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer; transition: 0.2s}
    .btn-load{background:var(--accent); color:#000}
    .btn-vr{background:#ff00ff; color:#fff}

    .channel-list { background:#071018; border-radius:10px; padding:5px; min-height: 150px; max-height: 350px; overflow-y: auto; border:1px solid #16202a; margin-bottom:15px; }
    .channel-item{padding:12px; border-bottom:1px solid #16202a; cursor:pointer; display:flex; justify-content:space-between; align-items:center}
    .channel-item.active{border-left:4px solid var(--accent); background:#111b25}
    
    #vr-layer { display:none; position:fixed; inset:0; z-index:10000; background:#000}
    body.is-vr #vr-layer { display:block }
    #vr-divider { position: fixed; left: 50%; top: 0; bottom: 0; width: 2px; background: rgba(255, 255, 255, 0.4); z-index: 10002; transform: translateX(-50%); pointer-events: none; }
    #vr-click-surface { position:fixed; inset:0; z-index:10005; background: transparent; cursor: pointer; touch-action: none; }
    #btn-exit-vr { position:fixed; top:20px; right:20px; z-index:10010; background:var(--danger); color:white; padding:15px 25px; border-radius:30px; font-weight:bold; border:2px solid white; }
    
    #feedback{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.8); color:var(--accent); padding:20px 40px; border-radius:40px; display:none; z-index:20000; border:2px solid var(--accent); font-size: 24px; font-weight: bold; pointer-events:none; }

    .video-container{ background:#000; border-radius:12px; position:relative; overflow:hidden; width:100%; aspect-ratio: 16 / 9; border:1px solid #22303a; margin-top: 10px; margin-bottom: 30px; }
    #videoPlayer, #webFrame { width:100%; height:100%; border:none; display:none; }
  </style>

  <script type="importmap">{ "imports": { "hls.js": "https://esm.sh/hls.js@1.4.12" } }</script>
</head>
<body>

  <div id="feedback"></div>

  <div id="vr-layer">
    <div id="vr-divider"></div>
    <div id="vr-click-surface"></div>
    <button id="btn-exit-vr" onclick="window.toggleVR()">SALIR VR</button>
    <a-scene embedded loading-screen="enabled:false" vr-mode-ui="enabled:false">
      <a-entity camera look-controls="enabled: false" position="0 1.6 0">
        <a-entity id="vr-display-container" position="0 0 -3.6">
          <a-video id="screenLeft" src="#videoPlayer" width="4.4" height="2.47" material="shader:flat"></a-video>
          <a-video id="screenRight" src="#videoPlayer" width="4.4" height="2.47" material="shader:flat"></a-video>
        </a-entity>
      </a-entity>
      <a-sky color="#000"></a-sky>
    </a-scene>
  </div>

  <div class="container">
    <h1 style="text-align:center; color:var(--accent);">IPTV VR Pro</h1>
    
    <div class="input-section">
      <input id="nameIn" type="text" placeholder="Nombre..." />
      <input id="urlIn" type="text" placeholder="URL M3U8..." />
      <button onclick="window.addUrl()" class="btn-load">AÑADIR</button>
      <input type="file" id="fileIn" style="display:none" onchange="window.handleFile(this)" />
      <button onclick="document.getElementById('fileIn').click()" style="background:var(--success); color:white">ARCHIVO M3U</button>
      <button onclick="window.clearAll()" style="background:var(--danger); color:white">BORRAR TODO</button>
    </div>

    <div style="display:flex; justify-content:space-between; margin: 10px 0;">
        <button onclick="window.toggleFS()" style="background:#444; color:#fff">PANTALLA COMPLETA</button>
        <button onclick="window.toggleVR()" class="btn-vr">MODO VR</button>
    </div>

    <div class="channel-list" id="list"></div>

    <div class="video-container" id="normalPlayerArea">
        <div id="normal-click-surface" style="position:absolute; inset:0; z-index:10;"></div>
        <video id="videoPlayer" crossorigin="anonymous" playsinline></video>
        <iframe id="webFrame"></iframe>
    </div>
  </div>

  <script type="module">
    import Hls from "hls.js";

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('Error SW', err));
      });
    }

    // LISTA POR DEFECTO ACTUALIZADA
    const defaultChannels = [
      {title:"YouTube Live 1", url:"https://youtu.be/vuTY4FDAbpA"},
      {title:"3ABN Kids", url:"https://3abn.bozztv.com/3abn2/Kids_live/smil:Kids_live.smil/playlist.m3u8"},
      {title:"3ABN Latino", url:"https://3abn.bozztv.com/3abn2/Lat_live/smil:Lat_live.smil/playlist.m3u8"},
      {title:"Spirit TV", url:"https://cdnlive.myspirit.tv/LS-ATL-43240-2/index.m3u8"},
      {title:"TVS Retro", url:"https://cdn.streamhispanatv.net:3531/live/tvsretrogtlive.m3u8"},
      {title:"Retro Plus TV", url:"https://scl.edge.grupoz.cl/retroplustvuno/live/playlist.m3u8"},
      {title:"Canela TV International", url:"https://amg00658-amg00658c8-canelatv-international-7227.playouts.now.amagi.tv/playlist/amg00658-canelamediafast-cinemalt-canelatvinternational/playlist.m3u8"},
      {title:"Cine Accion", url:"https://stmv6.voxtvhd.com.br/cineaccion/cineaccion/playlist.m3u8"},
      {title:"RT UH 720", url:"https://run-rt-uh.otteravision.com/run/rt_uh/rt_uh_720.m3u8"},
      {title:"YouTube Live 2", url:"https://youtu.be/s1Ylmj87gXY"},
      {title:"RA ES 720", url:"https://run-ra-es.otteravision.com/run/ra_es/ra_es_720.m3u8"},
      {title:"RT ES 720p", url:"https://run-rt-es.otteravision.com/run/rt_es/rt_es_720p_high.m3u8"},
      {title:"Grjngo Peliculas", url:"https://amogonetworx-grjngo-2-eu.plex.wurl.tv/playlist.m3u8"},
      {title:"Plex Master", url:"https://d3rciv7av2te5a.cloudfront.net/v1/master/3fec3e5cac39a52b2132f9c66c83dae043dc17d4/prod-plex/master.m3u8?ads.xumo_channelId=88889309"},
      {title:"MyTime Spain", url:"https://appletree-mytimespain-rakuten.amagi.tv/playlist.m3u8"},
      {title:"CNN Fast", url:"https://amg00803-cnnfast-amg00803c3-lg-es-5477.playouts.now.amagi.tv/playlist1080p.m3u8"},
      {title:"RT Español", url:"https://rt-esp.rttv.com/live/rtesp/playlist_800Kb.m3u8"},
      {title:"DW Español", url:"https://dwamdstream104.akamaized.net/hls/live/2015530/dwstream104/index.m3u8"},
      {title:"CBS News NY", url:"https://www.cbsnews.com/common/video/cbsn-ny-prod.m3u8"},
      {title:"YouTube Live 3", url:"https://youtu.be/ZA6YS0CYoTA"},
      {title:"YouTube Live 4", url:"https://youtu.be/FV4Q9DryTG8"},
      {title:"Avivamiento HD", url:"https://s1.abntelevision.com/avivamientoabr/stream/avivamientohd/avivamientohd/playlist.m3u8"},
      {title:"Bendicion Channel", url:"https://s.emisoras.tv:8081/bendicionchannel/index.m3u8"},
      {title:"Vision Dorada", url:"https://movil.ejeserver.com/live/visiondorada.m3u8"},
      {title:"Teledorada HD", url:"https://movil.ejeserver.com/live/teledoradahd.m3u8"},
      {title:"Oracion con Son", url:"https://canal.mediaserver.com.co/live/oracionconson.m3u8"},
      {title:"Canica TV", url:"https://stmv4.voxtvhd.com.br/canicatv/canicatv/playlist.m3u8"},
      {title:"NTV Live", url:"https://mist01.homestream.fun/hls/ntvlive/0_1/index.m3u8"},
      {title:"La Morada TV", url:"https://movil.ejeserver.com/live/lamoradatv.m3u8"},
      {title:"Onda Stereo", url:"https://stmv4.voxtvhd.com.br/ondastereo/ondastereo/playlist.m3u8"},
      {title:"Rio TV", url:"https://cdn.amelbasoluciones.co:8081/riotv/index.fmp4.m3u8"},
      {title:"Telebolivar", url:"https://live20.bozztv.com/akamaissh101/ssh101/telebolivar/playlist.m3u8"},
      {title:"Tu Universo TV", url:"https://5bf8041cb3fed.streamlock.net/TUUNIVERSOTV/TUUNIVERSOTV/playlist.m3u8"},
      {title:"Austral TV", url:"https://stmv3.voxtvhd.com.br/australtv/australtv/playlist.m3u8"},
      {title:"GM7 Digital", url:"https://s2.tvdatta.com:3858/live/gm7digitallive.m3u8"},
      {title:"Latacunga TV", url:"https://stmv1.voxtvhd.com.br/latacungatv/latacungatv/playlist.m3u8"},
      {title:"TV3 Ecuador", url:"https://tv3ecuador.site/hls/stream/index.m3u8"},
      {title:"TV Cisne", url:"https://video2.lhdserver.es/tvcisne/live.m3u8"},
      {title:"Vos TV", url:"https://cloud37.ecuatel.com/vostv/live/manifest.m3u8"},
      {title:"France 24 Español", url:"https://a-cdn.klowdtv.com/live2/france24sp_720p/playlist.m3u8"},
      {title:"Viginet Venezuela", url:"https://e1.viginet.vectormax.com:5210/quickstart/114-934-21/index.m3u8"},
      {title:"Sono Onda TV (Ecuador)", url:"https://live.obslivestream.com/sonoondatv/index.m3u8"},
      {title:"Peru Live", url:"https://cdnhd.iblups.com/hls/902c1a0395264f269f1160efa00660e47.m3u8"},
      {title:"Atacama Noticias (Chile)", url:"https://v2.tustreaming.cl/atacamanoticias/index.m3u8"},
      {title:"PNT Chile", url:"https://pnt.janusmedia.tv/hls/pnt.m3u8"},
      {title:"CN247 (Argentina)", url:"https://panel.host-live.com:19360/cn247tv/cn247tv.m3u8"},
      {title:"Canal U (Uruguay)", url:"https://livedelta.cdn.antel.net.uy/out/u/url_canalu.m3u8"},
      {title:"4D Mas Noticias (Paraguay)", url:"https://rds3.desdeparaguay.net/4dmasnoticiastv/4dmasnoticiastv/playlist.m3u8"},
      {title:"800 TV (Paraguay)", url:"https://tigocloud.desdeparaguay.net/800tv/800tv/playlist.m3u8"},
      {title:"Zoy Plus (Bolivia)", url:"https://mio.zoymilton.com/ZoyPlus/index.m3u8"},
      {title:"Video News (Brasil)", url:"https://video01.logicahost.com.br/tvideonews/tvideonews/playlist.m3u8"},
      {title:"Euronews Español", url:"https://d35j504z0x2vu2.cloudfront.net/v1/master/0bc8e8376bd8417a1b6761138aa41c26c7309312/euronews-spa/euronews-es.m3u8"},
      {title:"Impacto TV", url:"https://cloudvideo.servers10.com:8081/impactotv/index.m3u8"},
      {title:"Milenial News", url:"https://www.milenial.news/salida/milenial.m3u8"},
      {title:"TV Oriente", url:"https://live.obslivestream.com/tvoriente/index.m3u8"},
      {title:"Telecolor", url:"https://live.obslivestream.com/telecolormux/index.m3u8"},
      {title:"Unitel TV", url:"https://play.agenciastreaming.com:8081/uniteltv/index.m3u8"},
      {title:"Viva TV", url:"https://live.obslivestream.com/vivatv/index.m3u8"},
      {title:"Vepaco TV", url:"https://cloud.fastchannel.es/manifiest/hls/prog9/vepacotv.m3u8"}
    ];

    const state = JSON.parse(localStorage.getItem('iptv_vr_final')) || { channels: defaultChannels, current: -1, eyeGap: 1.95 };
    const video = document.getElementById('videoPlayer');
    const iframe = document.getElementById('webFrame');
    const feedback = document.getElementById('feedback');
    let hls = null;

    window.saveState = () => localStorage.setItem('iptv_vr_final', JSON.stringify(state));

    window.playUrl = async (rawUrl, index) => {
      if(hls) { hls.destroy(); hls = null; }
      video.pause(); video.src = ""; iframe.src = "";
      state.current = index; window.saveState(); render();

      if (rawUrl.includes('youtube.com') || rawUrl.includes('youtu.be')) {
        const ytID = rawUrl.match(/(?:youtu\.be\/|youtube\.com\/(?:v\/|u\/\w\/|embed\/|watch\?v=))([^#\&\?]*)/)?.[1];
        video.style.display = "none"; iframe.style.display = "block";
        iframe.src = `https://www.youtube.com/embed/${ytID}?autoplay=1`;
      } else {
        iframe.style.display = "none"; video.style.display = "block";
        if (Hls.isSupported()) {
          hls = new Hls(); hls.loadSource(rawUrl); hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
        } else { video.src = rawUrl; video.play().catch(()=>{}); }
      }
      showFeedback(state.channels[index].title);
    };

    let startY = 0, startX = 0, isDragging = false;
    const handleStart = (e) => {
        isDragging = true;
        const touch = e.touches ? e.touches[0] : e;
        startY = touch.clientY; startX = touch.clientX;
    };

    const handleEnd = (e) => {
        if (!isDragging) return;
        const touch = e.changedTouches ? e.changedTouches[0] : e;
        const endY = touch.clientY; const endX = touch.clientX;
        const diffY = startY - endY; const diffX = startX - endX;
        const width = window.innerWidth;
        const xPosPercent = (startX / width) * 100;

        if (Math.abs(diffY) > 60) {
            const delta = diffY > 0 ? 0.08 : -0.08;
            state.eyeGap = Math.max(1.50, Math.min(2.80, state.eyeGap + delta));
            updateScreens();
            showFeedback(`Calibrar: ${state.eyeGap.toFixed(2)}`);
            window.saveState();
        } else if (Math.abs(diffY) < 20 && Math.abs(diffX) < 20) {
            if (state.channels.length === 0) return;
            if (xPosPercent < 30) {
                state.current = (state.current - 1 + state.channels.length) % state.channels.length;
                window.playUrl(state.channels[state.current].url, state.current);
            } else if (xPosPercent > 70) {
                state.current = (state.current + 1) % state.channels.length;
                window.playUrl(state.channels[state.current].url, state.current);
            } else {
                if (video.style.display !== "none") {
                    if (video.paused) { video.play(); showFeedback("PLAY"); }
                    else { video.pause(); showFeedback("PAUSA"); }
                }
            }
        }
        isDragging = false;
    };

    function updateScreens() {
        const L = document.getElementById('screenLeft'), R = document.getElementById('screenRight');
        if (L && R) {
            L.setAttribute('position', `-${state.eyeGap} 0 0`);
            R.setAttribute('position', `${state.eyeGap} 0 0`);
            L.setAttribute('width', '4.4'); R.setAttribute('width', '4.4');
            L.setAttribute('height', '2.47'); R.setAttribute('height', '2.47');
        }
    }

    [document.getElementById('normal-click-surface'), document.getElementById('vr-click-surface')].forEach(el => {
        el.addEventListener('mousedown', handleStart);
        el.addEventListener('mouseup', handleEnd);
        el.addEventListener('touchstart', handleStart, {passive: false});
        el.addEventListener('touchend', handleEnd, {passive: false});
    });

    window.handleFile = (input) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split('\n');
            lines.forEach((line, i) => {
                if (line.startsWith('#EXTINF:')) {
                    const url = lines[i+1]?.trim();
                    if(url && !url.startsWith('#')) state.channels.push({title: line.split(',')[1] || "Canal", url});
                }
            });
            window.saveState(); render();
        };
        reader.readAsText(input.files[0]);
    };

    window.addUrl = () => {
      const u = document.getElementById('urlIn'), n = document.getElementById('nameIn');
      if(u.value.trim()){
        state.channels.push({title: n.value.trim() || "Canal", url: u.value.trim()});
        u.value = ""; n.value = ""; window.saveState(); render();
      }
    };

    window.toggleVR = () => {
      const isVR = document.body.classList.toggle('is-vr');
      const scene = document.querySelector('a-scene');
      if (isVR) {
          document.documentElement.requestFullscreen?.().catch(()=>{});
          if(scene) scene.play(); updateScreens();
      } else {
          if(document.fullscreenElement) document.exitFullscreen();
          if(scene) scene.pause();
      }
    };

    window.toggleFS = () => {
      const area = document.getElementById('normalPlayerArea');
      if (!document.fullscreenElement) area.requestFullscreen();
      else document.exitFullscreen();
    };

    window.clearAll = () => { if(confirm("¿Borrar todos los canales?")) { state.channels = []; state.current = -1; window.saveState(); render(); } };

    function showFeedback(txt) { 
        feedback.textContent = txt; feedback.style.display = "block"; 
        setTimeout(() => feedback.style.display = "none", 1000); 
    }

    function render() {
      const listDiv = document.getElementById('list');
      listDiv.innerHTML = state.channels.map((ch, i) => `
        <div class="channel-item ${state.current === i ? 'active' : ''}" onclick="window.playUrl('${ch.url}', ${i})">
            <div><b>${ch.title}</b></div>
            <button style="background:#444; color:#fff; padding:5px 10px; border-radius:5px" onclick="event.stopPropagation(); state.channels.splice(${i}, 1); window.saveState(); render();">X</button>
         </div>`).join('') || '<div style="padding:15px; color:#666; text-align:center">Sin canales</div>';
    }

    render();
    document.querySelector('a-scene').addEventListener('loaded', function () { this.pause(); });
  </script>
</body>
</html>
