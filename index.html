<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="IPTV Player">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    
    <!-- Agregar iconos para iOS -->
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-192.png">
    
    <!-- Agregar metas adicionales para iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="IPTV Player">
    
    <!-- Agregar theme-color para navegadores modernos -->
    <meta name="theme-color" content="#00d4ff">
    <meta name="msapplication-navbutton-color" content="#00d4ff">
    
    <!-- Precargar recursos críticos -->
    <link rel="preload" href="https://esm.sh/hls.js@1.4.12" as="script">
    <link rel="preload" href="styles.css" as="style">
    
    <!-- Instalar automáticamente cuando sea posible -->
    <script>
        // Detectar si el navegador soporta PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registrado correctamente');
                        
                        // Verificar si hay una actualización disponible
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // Nueva versión disponible
                                    if (confirm('¡Hay una nueva versión disponible! ¿Deseas actualizar?')) {
                                        newWorker.postMessage({ action: 'skipWaiting' });
                                    }
                                }
                            });
                        });
                    })
                    .catch(error => {
                        console.log('Error al registrar ServiceWorker:', error);
                    });
            });
        }
        
        // Detectar cuando la app se ejecuta en modo standalone
        if (window.matchMedia('(display-mode: standalone)').matches) {
            console.log('App ejecutándose en modo standalone');
            document.body.classList.add('pwa-installed');
        }
        
        // Agregar animación CSS dinámica
        const style = document.createElement('style');
        style.textContent = `
            .pwa-installed .install-button {
                display: none !important;
            }
        `;
        document.head.appendChild(style);
    </script>
    
    <!-- Tema para navegadores -->
    <meta name="theme-color" content="#00d4ff">
    <meta name="msapplication-navbutton-color" content="#00d4ff">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Reproductor IPTV</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Reproductor IPTV</h1>
        
        <!-- Sección para cargar canales individuales -->
        <div class="input-section">
            <input type="text" id="channelUrl" placeholder="Pega la URL del canal (.m3u8)">
            <button id="loadChannel" class="btn-primary">Cargar Canal</button>
        </div>
        
        <!-- Sección para cargar lista M3U -->
        <div class="input-section">
            <input type="file" id="m3uFile" accept=".m3u,.m3u8" class="file-input">
            <button id="loadList" class="btn-secondary">Cargar Lista M3U</button>
            <button id="clearList" class="btn-secondary" style="background-color: #ff4444;">Limpiar Lista</button>
        </div>
        
        <!-- Sección para buscar canales -->
        <div class="input-section">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Buscar canal...">
                <span class="search-icon">🔍</span>
            </div>
            <label class="favorites-toggle">
                <input type="checkbox" id="favoritesToggle">
                <span class="toggle-label">★ Solo Favoritos</span>
            </label>
        </div>
        
        <!-- Lista de canales -->
        <div id="channelList" class="channel-list">
            <p class="empty-message">No hay canales cargados</p>
        </div>
        
        <!-- Reproductor de video -->
        <div class="video-container">
            <video id="videoPlayer" controls></video>
            <div id="loading" class="loading">Cargando...</div>
            <!-- Controles de cambio de canal -->
            <div class="channel-controls">
                <button class="channel-btn prev-channel" id="prevChannel">◀ Anterior</button>
                <button class="channel-btn favorite-current" id="favoriteCurrent" title="Marcar como favorito">★</button>
                <span class="current-channel-info" id="currentChannelInfo"></span>
                <button class="channel-btn next-channel" id="nextChannel">Siguiente ▶</button>
            </div>
        </div>
        
        <!-- Botón de play manual para móvil (oculto por defecto) -->
        <div id="playButton" class="play-button" style="display: none;">
            <button class="btn-primary">▶ Reproducir</button>
        </div>
    </div>
    
    <script type="importmap">
    {
        "imports": {
            "hls.js": "https://esm.sh/hls.js@1.4.12"
        }
    }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
